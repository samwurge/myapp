name: Build and Deploy to Kubernetes

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: samwurge/myapp

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build Docker image
        run: docker build -t samwurge/myapp:latest .

      - name: Push Docker image
        run: docker push samwurge/myapp:latest

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Deploy to Kubernetes (force update)
        run: |
          kubectl set image deployment/myapp myapp=samwurge/myapp:latest
          kubectl rollout restart deployment/myapp
          kubectl rollout status deployment/myapp --timeout=120s
